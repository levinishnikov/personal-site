<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts — Daniel Levi</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Daniel Levi
    </a>
  </nav>

  <main class="post-main">
    <div class="posts-page-header reveal">
      <div class="posts-page-top">
        <h1 class="posts-page-title">My Posts.</h1>
        <span class="posts-page-count" id="posts-count"></span>
      </div>
      <p class="posts-page-subtitle">Teaching AI to be useful, against its will.</p>
    </div>

    <section class="section glass reveal">
      <ol class="post-list posts-page-list" id="post-list">
        <li class="post-list-loading">Loading…</li>
      </ol>
    </section>
  </main>

  <footer class="footer">
    <span>daniellevi.com</span>
  </footer>

  <script>
    const root = document.documentElement;
    document.addEventListener('mousemove', e => {
      root.style.setProperty('--mx', e.clientX + 'px');
      root.style.setProperty('--my', e.clientY + 'px');
    });

    const observer = new IntersectionObserver(entries => {
      entries.filter(e => e.isIntersecting).forEach(entry => {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      });
    }, { threshold: 0, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    fetch('/api/posts')
      .then(r => r.json())
      .then(posts => {
        const list = document.getElementById('post-list');
        const countEl = document.getElementById('posts-count');

        if (!posts.length) {
          list.innerHTML = '<li style="color:var(--muted);font-size:14px">No posts yet.</li>';
          return;
        }

        posts.sort((a, b) => {
          const da = a.publish_date ? new Date(a.publish_date) : new Date(a.year, 0);
          const db = b.publish_date ? new Date(b.publish_date) : new Date(b.year, 0);
          return db - da;
        });

        countEl.textContent = posts.length;

        list.innerHTML = posts.map(p => {
          let label;
          if (p.publish_date) {
            const [y, m] = p.publish_date.split('-').map(Number);
            label = new Date(y, m - 1).toLocaleString('en', { month: 'short', year: 'numeric' });
          } else {
            label = p.year;
          }
          return `
          <li>
            <span class="year">${label}</span>
            <a href="/post.html?slug=${p.slug}">${p.title}</a>
          </li>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('post-list').innerHTML =
          '<li style="color:var(--muted);font-size:14px">Could not load posts.</li>';
      });
  </script>

</body>
</html>
